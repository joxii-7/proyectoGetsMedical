
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
{% extends 'base.html' %}
{% block content %}
<h2>Equipos con alerta</h2>

<table class="table table-striped">
<tr>
    <th>Equipo</th>
    <th>Último mantenimiento</th>
</tr>

{% for e in equipos %}
<tr>
    <td>{{ e.equipo.nombre }}</td>
    <td>{{ e.ultimo }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
