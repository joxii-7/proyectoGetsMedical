{% extends 'base.html' %}

{% block title %}Equipos{% endblock %}

{% block content %}

<div class="card p-4">

<h4 class="mb-3">Lista de Equipos</h4>

<!-- 🔍 BUSCADOR PRO -->
<form method="get" class="mb-4 d-flex gap-2">
    <input 
        type="text" 
        name="q" 
        placeholder="Buscar por nombre, código, tipo..." 
        class="form-control"
        value="{{ request.GET.q }}"
    >
    <button type="submit" class="btn btn-primary">Buscar</button>
</form>

<!-- 📊 TABLA -->
<div class="table-responsive">
<table class="table table-hover align-middle">

<thead class="table-light">
<tr>
    <th>Código</th>
    <th>Nombre</th>
    <th>Tipo</th>
    <th>Ubicación</th>
</tr>
</thead>

<tbody>
{% for e in equipos %}
<tr>
    <td>
        <a href="/equipo/{{ e.id }}/" class="text-decoration-none fw-bold text-primary">
            {{ e.codigo }}
        </a>
    </td>
    <td>{{ e.nombre }}</td>
    <td>{{ e.tipo }}</td>
    <td>{{ e.ubicacion }}</td>
</tr>
{% endfor %}
</tbody>

</table>
</div>

</div>

{% endblock %}
